{{ define "main" }}
<div class="section">
    <a href="/categories/">Liste des catégories</a>
    <div class="content">
        <h1>Catégories: {{ .Title }}</h1>
        {{ .Content }}
    </div>
    <div class="columns is-justify-content-center is-align-items-center">
        {{ range .Paginator.Pages }}
        <div class="column" style="max-width: 500px; margin: auto;">
            {{ partial "widgets/thumbs.html" . }}
        </div>
        {{ end }}
    </div>
    <div class="columns is-centered">
        <div class="column is-narrow">
            {{ partial "widgets/pagination.html" . }}
        </div>
    </div>
</div>
{{ end }}
